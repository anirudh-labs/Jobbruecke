<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seite nicht gefunden — Jobbrücke</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--accent:#1e5f6a;--ink:#1a1a1a;--soft:#4a4a4a;--muted:#8a8a8a;--line:#e5e5e5;--paper:#fff;--bg:#f8f6f3}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
.big{font-family:'Fraunces',serif;font-size:8rem;font-weight:800;color:var(--accent);line-height:1;margin-bottom:1rem;letter-spacing:-.04em}
h1{font-family:'Fraunces',serif;font-size:2rem;font-weight:700;margin-bottom:1rem;letter-spacing:-.02em}
p{color:var(--soft);max-width:420px;line-height:1.6;margin-bottom:2rem}
.btn{background:var(--accent);color:#fff;padding:.9rem 1.75rem;border-radius:100px;text-decoration:none;font-weight:600;transition:all .2s;display:inline-block}
.btn:hover{background:#145055;transform:translateY(-1px)}
.links{margin-top:2.5rem;display:flex;gap:1.5rem;font-size:.9rem}
.links a{color:var(--soft);text-decoration:none;transition:color .2s}
.links a:hover{color:var(--accent)}
</style>
</head>
<body>
<div class="big">404</div>
<h1>Seite nicht gefunden</h1>
<p>Die Seite, die du suchst, existiert nicht mehr — oder hat nie existiert. Kein Grund zur Sorge.</p>
<a href="/" class="btn">← Zur Startseite</a>

  <a href="cv.html">Lebenslauf</a>
  <a href="jobs.html">Jobs finden</a>
  <a href="anschreiben.html">Anschreiben</a>
</div>
</body>
</html>
